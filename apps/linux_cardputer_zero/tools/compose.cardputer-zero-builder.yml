name: trailmate-cardputer-zero-package

services:
  deb-builder:
    image: ${TRAIL_MATE_CARDPUTER_ZERO_BUILDER_IMAGE:-trailmate-cardputer-zero-builder:bookworm-arm64}
    platform: ${TRAIL_MATE_CARDPUTER_ZERO_DOCKER_PLATFORM:-linux/arm64}
    build:
      context: .
      dockerfile: Dockerfile.cardputer-zero-builder
      args:
        TRAIL_MATE_CARDPUTER_ZERO_APT_MIRROR: ${TRAIL_MATE_CARDPUTER_ZERO_APT_MIRROR:-}
    environment:
      TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_JOBS: ${TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_JOBS:-2}
      TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_VERSION: ${TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_VERSION:-0.1.29-alpha}
      TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_BUILD_TYPE: ${TRAIL_MATE_CARDPUTER_ZERO_PACKAGE_BUILD_TYPE:-Release}
    working_dir: /work/source
    volumes:
      - cardputer-zero-cmake-build:/work/build
    command: ["/bin/sleep", "infinity"]

volumes:
  cardputer-zero-cmake-build:
